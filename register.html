<!DOCTYPE html>
<html>
<head>

<title>Register</title>

<link rel="stylesheet" href="styles.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body class="d-flex justify-content-center align-items-center">

<div class="card p-4" style="width:380px">

<h4 class="text-center">Register</h4>

<form action="login.html">

<input class="form-control mb-2" placeholder="Name" required>

<input class="form-control mb-2" type="email" placeholder="Email" required>

<div class="input-group mb-2">

<input id="regPass" class="form-control" type="password"
placeholder="Password" onkeyup="strength()" required>

<button class="btn btn-outline-secondary" type="button"
onclick="toggle('regPass')">

<i class="bi bi-eye"></i>

</button>

</div>

<div id="msg" class="small mb-2"></div>

<input class="form-control mb-3" type="password"
placeholder="Confirm Password" required>

<button class="btn btn-primary w-100">Create Account</button>

</form>

</div>

<script>

function toggle(id){
let x=document.getElementById(id)
x.type=x.type==="password"?"text":"password"
}

function strength(){
let p=document.getElementById("regPass").value
let m=document.getElementById("msg")

if(p.length<5) m.innerHTML="Weak"
else if(p.length<8) m.innerHTML="Medium"
else m.innerHTML="Strong"
}

</script>

</body>
</html>
